name: Require @claude tag

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  check-claude-tagged:
    runs-on: ubuntu-latest
    permissions:
      statuses: write
      pull-requests: read
      issues: read
    if: github.event.issue.pull_request || github.event.pull_request
    steps:
      - name: Post @claude tag status
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue?.number
              || context.payload.pull_request?.number;

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const overridden = pr.data.labels.some(l => l.name === 'override-claude-review');

            let passed, description;
            if (overridden) {
              passed = true;
              description = '✅ claude check overridden';
            } else {
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
              });
              passed = comments.data.some(c => c.body.includes('@claude'));
              description = passed ? '✅ @claude has been tagged' : '❌ @claude must be tagged';
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: pr.data.head.sha,
              state: passed ? 'success' : 'failure',
              description,
              context: 'claude-tag',
            });
