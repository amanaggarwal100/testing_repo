name: Require @claude tag

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-claude-tagged:
    runs-on: ubuntu-latest
    permissions:
      statuses: write
      pull-requests: read
      issues: read
    if: github.event.issue.pull_request || github.event.pull_request
    steps:
      - name: Check for @claude mention in any comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue?.number
              || context.payload.pull_request?.number;
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const hasClaude = comments.data.some(c => c.body.includes('@claude'));
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: pr.data.head.sha,
              state: hasClaude ? 'success' : 'failure',
              description: hasClaude ? '✅ @claude has been tagged' : '❌ @claude must be tagged',
              context: 'claude-tag',
            });
