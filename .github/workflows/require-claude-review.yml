name: Require @claude tag

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [labeled, unlabeled]

jobs:
  check-claude-tagged:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      issues: read
    if: github.event.issue.pull_request || github.event.pull_request
    steps:
      - name: Require @claude tag (unless overridden)
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue?.number
              || context.payload.pull_request?.number;

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const overridden = pr.data.labels.some(l => l.name === 'override-claude-review');
            if (overridden) {
              core.info('Override label present — skipping @claude tag requirement.');
              return;
            }

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const hasClaude = comments.data.some(c => c.body.includes('@claude'));
            if (!hasClaude) {
              core.setFailed('@claude must be tagged on the PR before merging.');
            } else {
              core.info('@claude has been tagged.');
            }
